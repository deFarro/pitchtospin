  <circle cx="16" cy="16" r="3.9" stroke="#fff" stroke-opacity="0.04" stroke-width="0.28"/>
  <path fill="url(#fm-g)" d="M16 4.32A11.68 11.68 0 0 1 27.68 16L16 16z" opacity="0.88"/>
